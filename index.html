<html>
    <head>
        <title>Shapiro Slider</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="./howler.min.js"></script>
        <script src="./Tone.js"></script>
    </head>
    <body style="background-color: black; color: white;">
        <div style="width: 100%;">
            <div style="display: flex; width: 600px; margin: 0 auto; font-size: 25px; font-weight: bold; margin-bottom: 20px; ">
                Sound <input type="checkbox" id="soundToggle" />
                <input type="range" min="0" max="120" value="50" id="slider" style="margin: 0 auto; width: 400px; display: block;" />
                <span id="sliderValue" style="display: block; text-align: center;">50%</span>
            </div>
            <div style="display: flex; width: 600px; margin: 0 auto; font-size: 25px; font-weight: bold; margin-bottom: 20px; ">
                Sound Clip
                <select id="soundSelect" style="margin-left: 10px;">
                    <option value="facts-dont-care.mp3" selected>Facts Don't Care</option>
                    <option value="ben-shapiro-wet-ass-p-word.mp3">Wet ass P word</option>
                    <option value="just-like-mommy-was.mp3">Just Like Mommy Was</option>
                    <option value="ben-shapiro-ok-this-is-epic.mp3">OK This Is Epic</option>
                    <option value="im-ben-shapiro-this-is-the-ben-shapiro-show.mp3">I'm Ben Shapiro, This Is The Ben Shapiro Show</option>
                    <option value="ben-shapiro-shut-the-f-up.mp3">Shut the F Up</option>
                    <option value="shapiro-bashing.mp3">Bashing Nazis</option>
                </select>
            </div>
            <div style="margin: 0 auto; width: 600px; height: 583px; background-image: url('./shapiro.png'); background-size: cover; overflow: hidden; position: relative;">
                <img class="left_eyebrow" src="./left_eyebrow.png" style="width: 109px; transform-origin: center; position: absolute; top: 221px; left: 174px;" />
                <img class="right_eyebrow" src="./right_eyebrow.png" style="width: 109px; transform-origin: center; position: absolute; top: 222px; right: 165px;" />
            </div>
            <div style="width: 600px; margin: 0 auto;">
                <p style="text-align: center; font-size: 20px; margin-top: 20px;">Follow me on twitch @ <a style="color: white;" href="https://twitch.tv/luney_luna" target="_blank">luney_luna</a></p>
            </div>
        </div>
    </body>
    <script>
    const slider = document.getElementById('slider');
    const sliderValue = document.getElementById('sliderValue');
    const soundToggle = document.getElementById('soundToggle');
    const leftEyebrow = document.querySelector('.left_eyebrow');
    const rightEyebrow = document.querySelector('.right_eyebrow');
    const soundSelect = document.getElementById('soundSelect');

    const pShift = new Tone.PitchShift().toDestination();
    const player = new Tone.Player({ url: './facts-dont-care.mp3', volume: -10 }).connect(pShift);

    soundSelect.addEventListener('change', async () => {
        player.stop();
        await player.load(`./${soundSelect.value}`);
    });

    slider.addEventListener('input', async () => {
        sliderValue.textContent = `${slider.value}%`;
        
        if (soundToggle.checked) {
            await Tone.start();
            player.stop();
            pShift.pitch = (50 -slider.value) / 50 * 12;
            //player.playbackRate = 0.4 / (slider.value / 100);
            player.start();
        } else {
            player.stop();
        }

        const scale = slider.value / 100 * 3;
        leftEyebrow.style.transform = `scaleY(${scale}) scaleX(${scale * 0.5})`;
        rightEyebrow.style.transform = `scaleY(${scale}) scaleX(${scale * 0.5})`;
    });
</script>
</html>
